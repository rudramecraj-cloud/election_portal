<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Digital Voting 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}
.container{
    width:100%;
    height:100vh;
    max-width:1600px;
}
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    background:
    radial-gradient(circle at top left,#f8fff9,#eafbf1),
    linear-gradient(135deg,#eafbf1,#f5fff8);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    height:100vh;
    background:white;
    border-radius:35px;
    border:1px solid #D8F3E2;
    box-shadow:0 20px 60px rgba(46,139,87,0.12);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}
.logo{
    width:150px;
    max-width:100%;
    margin-bottom:10px;
}

.school{
    font-size:42px;
    font-weight:700;
    color:#2E8B57;
    line-height:1.3;
}

.location{
    margin-top:5px;
    margin-bottom:15px;
    font-size:20px;
    color:#64748B;
}

.divider{
    width:100px;
    height:4px;
    background:#2E8B57;
    border-radius:20px;
    margin:15px auto;
}

.title{
    font-size:56px;
    font-weight:700;
    color:#1F2937;
    margin-bottom:10px;
}

.subtitle{
    color:#64748B;
    font-size:22px;
    margin-bottom:25px;
}

.start-btn{
    border:none;
    background:#2E8B57;
    color:white;
    padding:18px 50px;
    font-size:22px;
    font-weight:600;
    border-radius:18px;
    cursor:pointer;
    transition:all 0.3s ease;
}

.start-btn:hover{
    background:#256F46;
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(46,139,87,0.25);
}

.start-btn:active{
    transform:translateY(0);
}

.footer{
    margin-top:35px;
    color:#94A3B8;
    font-size:14px;
}

.badge{
    display:inline-block;
    padding:10px 18px;
    background:#F4FFF8;
    color:#2E8B57;
    border-radius:999px;
    border:1px solid #D8F3E2;
    font-weight:600;
    margin-bottom:25px;
}

@media(max-width:768px){

    .card{
        padding:40px 25px;
    }

    .logo{
        width:150px;
    }

    .school{
        font-size:26px;
    }

    .title{
        font-size:36px;
    }

    .subtitle{
        font-size:16px;
    }

}

</style>

</head>

<body>

<div class="container">
    <div class="card">
        <img
            src="{{ url_for('static', filename='logo.png') }}"
            alt="School Logo"
            class="logo"
        >
        <div class="school">
            SBOA PUBLIC (SR.SEC) SCHOOL
        </div>
        <div class="location">
            SOUTH CHITTOOR
        </div>
        <div class="divider"></div>

        <div class="title">
            🗳 DIGITAL VOTING 2026
        </div>
        <div class="subtitle">
            Welcome to the official digital election platform.<br>
            One Student • One Vote
        </div>
        <form action="/begin">
            <button type="submit" class="start-btn">
                Start Voting
            </button>
        </form>
    </div>

</div>

</body>

</html>
