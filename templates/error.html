<!DOCTYPE html>
<html>
<head>

<title>Error</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Poppins',sans-serif;
    background:#EAFBF1;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:450px;
    background:white;
    padding:40px;
    border-radius:24px;
    text-align:center;
    border-left:8px solid #DC2626;
    box-shadow:0 12px 30px rgba(46,139,87,0.12);
}

.icon{
    font-size:70px;
}

h1{
    color:#DC2626;
    margin:15px 0;
}

p{
    color:#64748B;
    margin-bottom:25px;
    line-height:1.6;
}

button{
    padding:12px 24px;
    border:none;
    border-radius:12px;
    background:#2E8B57;
    color:white;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    background:#256F46;
}

a{
    text-decoration:none;
}

</style>

</head>

<body>

<div class="card">

    <div class="icon">⚠️</div>

    <h1>Access Denied</h1>

    <p>{{ message }}</p>

    <a href="/voting">
        <button>Return Home</button>
    </a>

</div>

</body>
</html>
