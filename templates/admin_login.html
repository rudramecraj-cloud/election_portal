<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Poppins',sans-serif;
    background:#EAFBF1;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:420px;
    background:white;
    padding:40px;
    border-radius:24px;
    text-align:center;
    border:1px solid #D8F3E2;
    box-shadow:0 12px 30px rgba(46,139,87,0.12);
}

h1{
    color:#2E8B57;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    border:2px solid #D8F3E2;
    border-radius:12px;
    margin-top:10px;
}

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#2E8B57;
    color:white;
    cursor:pointer;
    font-weight:600;
}

button:hover{
    background:#256F46;
}

</style>

</head>

<body>

<div class="card">

    <h1>🔒 Admin Access</h1>

    <form method="POST">

        <input
            type="password"
            name="password"
            placeholder="Admin Password"
            required
        >

        <button type="submit">
            View Results
        </button>

    </form>

</div>

</body>
</html>
